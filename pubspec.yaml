name: mammabuddy
description: "MammaBuddy Mother & Baby Health Buddy application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^6.2.2
  provider: ^6.1.5
  go_router: ^17.2.0
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  google_fonts: ^8.0.2
  lottie: ^3.3.2
  flutter_svg: ^2.2.4
  flutter_animate: ^4.5.2
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.3.0
  flutter_markdown: ^0.7.7
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  image_picker: ^1.2.1
  font_awesome_flutter: ^11.0.0
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  url_launcher: ^6.3.2
  firebase_messaging: ^16.1.3
  speech_to_text: ^7.0.0
  razorpay_flutter: ^1.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"